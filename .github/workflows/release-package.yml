name: Build Release Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install development dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run unit tests
        run: composer test

      - name: Verify version consistency
        run: |
          PLUGIN_VERSION=$(grep -Po '(?<=Version:\s).*' noscrape.php | head -1 | xargs)
          STABLE_TAG=$(grep -Po '(?<=Stable tag:\s).*' readme.txt | head -1 | xargs)

          echo "Plugin version: $PLUGIN_VERSION"
          echo "Stable tag:     $STABLE_TAG"

          test "$PLUGIN_VERSION" = "$STABLE_TAG"

      - name: Build production package
        run: |
          rm -rf build noscrape.zip
          mkdir -p build/noscrape

          cp -R src build/noscrape/

          cp \
            noscrape.php \
            readme.txt \
            LICENSE \
            composer.json \
            composer.lock \
            build/noscrape/

          COMPOSER_VENDOR_DIR=build/noscrape/vendor composer install \
            --no-dev \
            --optimize-autoloader \
            --classmap-authoritative \
            --no-interaction \
            --no-progress \
            --prefer-dist

          find build/noscrape -type d -empty -delete

          test -f build/noscrape/vendor/autoload.php

          (
            cd build
            zip -q -r ../noscrape.zip noscrape
          )

      - name: Verify production package
        run: |
          unzip -t noscrape.zip

          echo "Checking for forbidden files..."

          if unzip -Z1 noscrape.zip | grep -Eq \
            '(^|/)(\.git|\.github|tests|node_modules|build)(/|$)|(^|/)(phpunit\.xml(\.dist)?|README\.md|\.gitignore|\.DS_Store)$'
          then
            echo "The production package contains development files."
            exit 1
          fi

          echo "Checking for nested ZIP files..."

          if unzip -Z1 noscrape.zip | grep -Eq '\.zip$'
          then
            echo "Nested ZIP files are not allowed."
            exit 1
          fi

          echo "Checking required files..."

          unzip -Z1 noscrape.zip | grep -q '^noscrape/composer\.json$'
          unzip -Z1 noscrape.zip | grep -q '^noscrape/readme\.txt$'
          unzip -Z1 noscrape.zip | grep -q '^noscrape/noscrape\.php$'
          unzip -Z1 noscrape.zip | grep -q '^noscrape/vendor/autoload\.php$'

      - name: Upload production package
        uses: actions/upload-artifact@v4
        with:
          name: noscrape-production-package
          path: noscrape.zip
          if-no-files-found: error
          retention-days: 30
